<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="black"
  stroke-width="2">

  <!-- Original smaller box -->
  <rect
    x="6.4406776"
    y="35.338982"
    width="20"
    height="20"
    fill="none"
    stroke="#000000"
    id="rect2" />
  <!-- Enriched larger box -->
  <rect
    x="63.389832"
    y="30.338984"
    width="30"
    height="30"
    fill="none"
    stroke="#000000"
    id="rect4" />
  <!-- Arrow connecting the two boxes -->
  <line
    x1="36.9743"
    y1="44.915249"
    x2="52.141037"
    y2="44.915249"
    marker-end="url(#arrowhead)"
    id="line6"
    style="stroke-width:1.74165" />
  <!-- Arrowhead marker -->
  <defs
    id="defs11">
    <marker
      id="arrowhead"
      markerWidth="10"
      markerHeight="7"
      refX="10"
      refY="3.5"
      orient="auto">
      <polygon
        points="10,3.5 0,7 0,0 "
        fill="#000000"
        id="polygon8" />
    </marker>
  </defs>
</svg>