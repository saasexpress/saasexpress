<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="black"
  stroke-width="2">
  <!-- Central circle representing the message -->
  <circle cx="50" cy="50" r="8" fill="black" />

  <!-- Arrows representing routing paths -->
  <line x1="50" y1="42" x2="50" y2="20" stroke="black" />
  <polygon points="50,20 47,25 53,25" fill="black" />

  <line x1="58" y1="50" x2="80" y2="50" stroke="black" />
  <polygon points="80,50 75,47 75,53" fill="black" />

  <line x1="50" y1="58" x2="50" y2="80" stroke="black" />
  <polygon points="50,80 47,75 53,75" fill="black" />

  <!-- Lines connecting the central circle to arrows -->
  <line x1="50" y1="50" x2="50" y2="42" />
  <line x1="50" y1="50" x2="58" y2="50" />
  <line x1="50" y1="50" x2="50" y2="58" />
</svg>