#
# - make the input and output available in content enricher
# - have "variables" in the content-enricher
#
#
name: tenant-api-mutation
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(POST|PUT|DELETE)$
      routes:
        - /api/tenants
        - /api/tenants/:id

  - id: rp
    action: ReverseProxy
    config:
      UpstreamServerURL: http://localhost:8081

  - id: bufin
    action: BufferToJSON

  - id: in
    action: ContentEnricher
    config:
      template: |
        {
          "message": "{action} {resource} ({id})",
          "result":  "success",
          "params": {
            "action":   "{{ .http_method }}",
            "resource": "Tenant",
            "id": "{{ .in.id }}{{ .params.id }}"
          }
        }

  - { id: j2b, action: JSONToBuffer }

  - id: create
    action: HTTPRequest
    config:
      method: POST
      url: http://localhost:8081/api/activity
      contentType: application/json

  - id: done
    action: NoOp

  - id: terminate
    action: Terminate

  # - { id: bufout, action: JSONToBuffer }

edges:
  - { from: start, to: rp }
  - { from: rp, to: bufin }
  - { from: rp, to: done }
  # - { from: start, to: bufin }
  - { from: bufin, to: in }
  - { from: in, to: j2b }
  - { from: j2b, to: create }
  - { from: create, to: terminate }

  # - { from: bufin, to: bufout }
