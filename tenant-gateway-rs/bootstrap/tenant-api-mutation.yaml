#
# - make the input and output available in content enricher
# - have "variables" in the content-enricher
#
#
name: tenant-api-mutation
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(POST|PUT|DELETE)$
      routes:
        - /api/tenants
        - /api/tenants/{id}

  - id: rp
    action: APICall
    config:
      url: http://localhost:8081

  - id: fanout
    action: FanOut

  - id: bufin
    action: BufferToJSON

  - id: in
    action: MessageTranslator
    config:
      template: |
        {
          "message": "{action} {resource} ({id})",
          "result":  "success",
          "params": {
            "action":  input.http_method,
            "resource": input.resource,
            "id": data.id
          }
        }

  - { id: j2b, action: JSONToBuffer }

  - id: create
    action: APICall
    config:
      method: POST
      url: http://localhost:8081
      path: /api/activity
      content_type: application/json

  - id: done
    action: Passthrough

  - id: terminate
    action: Terminate

  # - { id: bufout, action: JSONToBuffer }

edges:
  - { from: start, to: rp }
  - { from: rp, to: fanout }
  - { from: fanout, to: bufin }
  - { from: fanout, to: done }
  # - { from: start, to: bufin }
  - { from: bufin, to: in }
  - { from: in, to: j2b }
  - { from: j2b, to: create }
  - { from: create, to: terminate }

  # - { from: bufin, to: bufout }
