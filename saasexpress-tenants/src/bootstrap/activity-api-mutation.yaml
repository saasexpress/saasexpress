name: activity-api-mutation
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(DELETE|POST)$
      routes:
        - /api/activity
        - /api/activity/{id}

  - id: rp
    action: APICall
    config:
      url: http://localhost:8081

  - id: fanout
    action: FanOut

  # - id: bufin
