# cargo run -- -c examples/faker.yaml
#
# curl -v http://localhost:2243/faker-intemp -d '{"name":"joe"}'
name: faker-intemp
nodes:
  - id: start
    action: HTTPIn
    config:
      method: POST
      routes:
        - /faker-intemp

  - id: b2j
    action: BufferToJSON

  - id: faker
    action: Faker
    config: {}

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      in_temp: true
      template: |
        {
          "first_name": temp.faker.name
        }

  - id: translate2
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "data": data,
          "temp": temp
        }

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: faker }
  - { from: faker, to: translate }
  - { from: translate, to: translate2 }
