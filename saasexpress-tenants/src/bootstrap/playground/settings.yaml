name: timer-settings
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(GET)$
      routes:
        - /settings

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "health": {
            "translate": {
              "on-demand": "yes!"
            }
          }
        }

  - id: settings
    action: Settings

edges:
  - { from: start, to: translate }
  - { from: translate, to: settings }
