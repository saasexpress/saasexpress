name: ws
nodes:
  - id: start
    action: HTTPIn
    config:
      ws: true
      method: ^(ANY)$
      routes:
        - /ws

  - id: b2j
    action: BufferToJSON

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "action": input.http_method,
          "resource": input.resource,
          "data": data,
        }

  - id: j2b
    action: JSONToBuffer

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: translate }
  - { from: translate, to: j2b }
