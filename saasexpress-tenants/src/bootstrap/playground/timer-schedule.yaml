name: timer-schedule
nodes:
  - id: start
    action: Timer
    config:
      on_start: false

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "status": "Hardcoded UP!!"
        }

  - id: j2b
    action: JSONToBuffer

  - id: apicall
    action: APICall
    config:
      method: GET
      path: ""
      url: http://localhost:2243/health

edges:
  - { from: start, to: translate }
  - { from: translate, to: j2b }
  - { from: j2b, to: apicall }
