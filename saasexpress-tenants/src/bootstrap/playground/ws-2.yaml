name: ws-2
nodes:
  - id: start
    action: HTTPIn
    config:
      ws: true
      method: ^(ANY)$
      routes:
        - /ws-dest

  - id: rp
    action: APICall
    config:
      ws: true
      method: GET
      path: /ws-tweak
      url: http://localhost:2243

edges:
  - { from: start, to: rp }
