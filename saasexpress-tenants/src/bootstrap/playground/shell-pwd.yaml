#
# curl -v http://localhost:2243/shell-pwd
#
name: shell-pwd
nodes:
  - id: start
    action: HTTPIn
    config:
      method: GET
      routes:
        - /shell-pwd

  - id: b2j
    action: BufferToJSON

  - id: shell
    action: Shell
    config:
      command: terraform
      args:
        - state
        - show

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: shell }
