name: health
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(GET)$
      routes:
        - /health-temp

  - id: rp
    action: APICall
    config:
      path: "/health"
      url: http://localhost:2243

  - id: b2j
    action: BufferToJSON

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "status": "UP",
          "environment": settings,
          "temp": temp,
          "data": data
        }

edges:
  - { from: start, to: rp }
  - { from: rp, to: b2j }
  - { from: b2j, to: translate }
