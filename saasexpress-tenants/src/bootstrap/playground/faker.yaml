# cargo run -- -c examples/faker.yaml
#
# curl -v http://localhost:2243/faker -d '{}'
name: shell
nodes:
  - id: start
    action: HTTPIn
    config:
      method: POST
      routes:
        - /faker

  - id: b2j
    action: BufferToJSON

  - id: faker
    action: Faker
    config: {}

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "first_name": temp.faker.name
        }
edges:
  - { from: start, to: b2j }
  - { from: b2j, to: faker }
  - { from: faker, to: translate }
