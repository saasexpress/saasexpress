# https://martinfowler.com/articles/function-call-LLM.html
#
# curl http://localhost:2243/invoke/clarify -d '{"question": "what is tenant a name"}'
#

name: ai-function-clarify
nodes:
  - id: start
    action: AITool
    config:
      schema:
        name: clarify_request
        description: Ask user for clarification when request is unclear
        parameters:
          type: object
          properties:
            question:
              type: string
              description: Question to ask user for clarification
          required:
            - question

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "response": data.question
        }

edges:
  - { from: start, to: translate }
