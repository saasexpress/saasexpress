#
# AI_CHATGPT_CALL_AUTHORIZATION="Bearer sk"
#
# curl http://localhost:2243/ai/agent?prompt=find me tenants
#
name: ai-agent
nodes:
  - id: start
    action: HTTPIn
    config:
      method: GET
      routes:
        - /ai/agent

  - id: user_prompt
    action: MessageTranslator
    config:
      in_temp: false
      template: |
        {
            "prompt": temp.http_in.query.prompt
        }
     
  - id: agent
    action: AIAgent
    config: {}

  - id: system_prompt
    action: Stub
    config:
      content: |
        You are a tenant assistant. Use these functions:

        1. search_tenants: When user wants to find tenants (e.g., 'show me active tenants')
        2. get_tenant_details: When user asks about a specific tenant ID (e.g., 'tell me about tenant p1')
        3. clarify_request: When user's request is unclear

  # - id: output
  #   action: MessageTranslator
  #   config:
  #     out_temp: true
  #     temp_group: ai_agent_response
  #     template: |
  #       {
  #         "system_prompt": temp.ai_agent_system_prompt,
  #         "message": temp.ai_agent_message,
  #         "prompt": temp.http_in.query.prompt
  #       }

  # - id: j2b
  #   action: JSONToBuffer

  # - id: call
  #   action: APICall
  #   config:
  #     url: https://api.openai.com/v1/chat/completions
  #     method: POST

  # evaluate response based on "choices[0].finish_reason"
  # If tool_calls then callout to the particular function
  # If

  - id: tool_get_details
    action: Callout
    config:
      graph_name: ai-function-get-details

  - id: tool_clarify
    action: Callout
    config:
      graph_name: ai-function-clarify

  - id: tool_search
    action: Callout
    config:
      graph_name: ai-function-search

  # - id: agent_memory
  #   action: AITool
  #   config: {}

  - id: chatgpt
    action: APICall
    config:
      url: https://api.openai.com/v1/chat/completions
      method: POST

  - id: b2j
    action: BufferToJSON

edges:
  - { from: start, to: user_prompt }
  - { from: user_prompt, to: agent }
  - { from: agent, to: b2j }
  - { from: agent, to: system_prompt, role: "prompt" }
  # - { from: system_prompt, to: agent }
  # - { from: agent, to: output }

  - { from: agent, to: tool_get_details, role: "tool" }
  - { from: agent, to: tool_clarify, role: "tool" }
  - { from: agent, to: tool_search, role: "tool" }
  - { from: agent, to: chatgpt, role: "llm" }
  # - { from: chatgpt_j2b, to: chatgpt }
  # - { from: agent, to: agent_memory, role: "storage" }
  # - { from: agent, to: chatgpt, role: "llm" }
