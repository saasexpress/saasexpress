

name: oauth-signout
nodes:
  - id: start
    action: HTTPIn
    config:
      method: GET
      routes:
        - /auth/signout

  # Remove claim ticket
  - id: get_claim
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "claim_id": temp.http_in.cookies.s
        }

  - id: claim_check
    action: ClaimCheck
    config:
      action: Clear

  # OAUTH_SIGNOUT_PREP_END_URL = "/oidc/end"
  # OAUTH_SIGNOUT_PREP_COOKIE_DOMAIN = "localhost"
  # OAUTH_SIGNOUT_PREP_END_CLIENT_ID = "client_id"
  # OAUTH_SIGNOUT_PREP_END_EXTERNAL_URL = "http://localhost:2243/ui/"
  - id: prep
    action: MessageTranslator
    config:
      mode: json
      in_temp: true
      temp_group: http_in
      template: |
        {
          "response": {
            "redirect-url": {
              "url": settings.END_URL,
              "query": {
                "client_id": settings.CLIENT_ID,
                "post_logout_redirect_uri": settings.EXTERNAL_URL + "/ui/",
              }
            },
            "set-cookies": [
              {
                "name": "s",
                "value": "deleted",
                "path": "/",
                "domain": settings.COOKIE_DOMAIN,
                "http_only": true,
                "same_site": "Strict",
                "secure": true,
                "expire_hours": 0
              }
            ]
          }
        }

  - id: b2j
    action: BufferToJSON
edges:
  - { from: start, to: get_claim }
  - { from: get_claim, to: claim_check }
  - { from: claim_check, to: prep }
  - { from: prep, to: b2j }
