# auth-enforcer : use session token to get claim ticket, validate expiry, return 401 is expired
# auth-session: use claim ticket to get session token, return info about user
# auth-callback
# auth-signin : returns the link to the login page

name: oauth-callback
nodes:
  - id: start
    action: HTTPIn
    config:
      method: GET
      routes:
        - /auth/callback

  - id: b2j
    action: BufferToJSON

  # Use query.session_state to look up the details of the original request (i.e./ redirect_uri)

  # OAUTH_CALLBACK_TRANSLATE_URL = "https://c1sk9y.logto.app/oidc/token"
  # OAUTH_CALLBACK_TRANSLATE_CLIENT_ID = "client_id"
  # OAUTH_CALLBACK_TRANSLATE_CLIENT_SECRET = "client_secret"
  - id: translate
    action: MessageTranslator
    config:
      mode: json
      in_temp: true
      temp_group: APICall
      template: |
        {
          "url": settings.URL,
          "content_type": "application/x-www-form-urlencoded",
          "body": {
            "grant_type": "authorization_code",
            "code": temp.http_in.query.code,
            "client_id": settings.CLIENT_ID,
            "client_secret": settings.CLIENT_SECRET
          },
          "path": "",
          "headers": {}
        }

  - id: j2b
    action: JSONToBuffer

  - id: token
    action: APICall
    config:
      method: POST
      url: temp.token.url

  # {
  #   "access_token": "",
  #   "expires_in": 3600,
  #   "id_token": "",
  #   "scope": "openid",
  #   "token_type": "Bearer"
  #   "refresh_token": "" (if offline_access is requested)
  # }

  # Do a callout to get the user info using the access token (or id token)
  # OAUTH_CALLBACK_USERINFO_URL = "https://c1sk9y.logto.app/oidc/userinfo"

  - id: userinfo_prep
    action: MessageTranslator
    config:
      mode: json
      in_temp: true
      temp_group: APICall
      template: |
        {
          "url": "https://c1sk9y.logto.app/oidc/me",
          "content_type": "application/json",
          "body": null,
          "path": "",
          "headers": {
            "Authorization": "Bearer " + data.access_token
          }
        }

  - id: j2b2
    action: JSONToBuffer

  - id: userinfo
    action: APICall
    config:
      method: GET
      url: temp.token.url


  # Do a callout to create a new Session (Claim ticket)

  # Return a Set-Cookie header with the session ID
  # Return a HTTP Redirect

  - id: claim_check_prep
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "data": data,
          "temp": temp
        }

  - id: claim_check
    action: ClaimCheck

  - id: final
    action: MessageTranslator
    config:
      mode: json
      in_temp: true
      temp_group: http_in
      template: |
        {
          "response": {
            "redirect-url": "http://localhost:2243/ui/tenants",
            "set-cookies": [
              {
                "name": "s",
                "value": data.claim_value,
                "path": "/",
                "domain": "localhost",
                "http_only": true,
                "same_site": "Strict",
                "secure": false,
                "expire_hours": 24*8
              }
            ]
          }
        }

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: translate }
  - { from: translate, to: j2b }
  - { from: j2b, to: token }
  - { from: token, to: userinfo_prep }
  - { from: userinfo_prep, to: j2b2 }
  - { from: j2b2, to: userinfo }
  - { from: userinfo, to: claim_check_prep }
  - { from: claim_check_prep, to: claim_check }
  - { from: claim_check, to: final }
