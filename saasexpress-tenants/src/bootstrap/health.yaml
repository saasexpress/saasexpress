name: health
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(GET)$
      routes:
        - /health

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "status": "UP",
          "environment": settings,
          "temp": temp
        }

edges:
  - { from: start, to: translate }
