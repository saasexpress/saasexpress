#
# curl -v http://localhost:2243/v1/<vault api>
#
# VAULT_RP_X_VAULT_TOKEN=
# VAULT_RP_X_VAULT_NAMESPACE=
#

name: vault
nodes:
  - id: start
    action: HTTPIn
    config:
      method: GET
      routes:
        - /v1/{*rest}

  - id: rp
    action: APICall
    config:
      path: ""
      url: https://vault.developer.gov.bc.ca
      method: GET

  - id: b2j
    action: BufferToJSON

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "do_token": data.data.data["do_token"]
        }
edges:
  - { from: start, to: rp }
  - { from: rp, to: b2j }
  - { from: b2j, to: translate }
