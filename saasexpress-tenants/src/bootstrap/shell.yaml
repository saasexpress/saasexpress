#
# curl -v http://localhost:2243/shell -d '{"data": "echo hello"}'
#
name: shell
nodes:
  - id: start
    action: HTTPIn
    config:
      method: POST
      routes:
        - /shell

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        { "command": data.data }

  - id: shell
    action: Shell
    config:
      command: bash
      # args:
      #   - "-i"

edges:
  - { from: start, to: translate }
  - { from: translate, to: shell }
