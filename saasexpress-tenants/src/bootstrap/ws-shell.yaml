name: ws-3
nodes:
  - id: start
    action: HTTPIn
    config:
      ws: true
      method: ^(ANY)$
      routes:
        - /ws-shell

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        { "command": data.data }

  - id: shell
    action: Shell
    config:
      command: bash
      # args:
      #   - "-i"

edges:
  - { from: start, to: translate }
  - { from: translate, to: shell }
