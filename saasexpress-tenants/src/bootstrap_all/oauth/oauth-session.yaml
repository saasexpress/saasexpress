
name: oauth-session
nodes:
  - id: start
    operator: HTTPIn
    config:
      method: GET
      routes:
        - /auth/session

  - id: get_claim
    operator: MessageTranslator
    config:
      mode: json
      template: |
        {
          "claim_id": temp.http_in.cookies.s
        }

  - id: claim_check
    operator: ClaimCheck
    config:
      operator: Get

  - id: b2j
    operator: BufferToJSON

  - id: response
    operator: MessageTranslator
    config:
      mode: json
      template: |
        {
          "sub": data.data.sub,
          "email": data.data.email
        }

edges:
  - { from: start, to: get_claim }
  - { from: get_claim, to: claim_check }
  - { from: claim_check, to: b2j }
  - { from: b2j, to: response }
