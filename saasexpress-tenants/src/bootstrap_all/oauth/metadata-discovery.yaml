# Cryptographically secure random generation using rand::thread_rng()
# URL-safe base64 encoding without padding
# SHA256 hashing for the challenge
# RFC 7636 compliance (43-128 character length)

# cat ./saasexpress-tenants/src/bootstrap/oauth/metadata-discovery.yaml | cargo run -- -i

name: oauth-metadata-discovery
nodes:
  # OAUTH_METADATA_DISCOVERY_CALL_URL = "https://discovery"
  - id: call
    operator: APICall
    config:
      url: "{OAUTH_SERVER}.well-known/openid-configuration"
  - id: reduce
    operator: MessageTranslator
    config:
      mode: json
      in_temp: false
      temp_group: discovery
      template: |
        {
          "token_endpoint": data.token_endpoint,
          "authorization_endpoint": data.authorization_endpoint,
          "userinfo_endpoint": data.userinfo_endpoint,
        }

edges:
  - { from: call, to: reduce }
