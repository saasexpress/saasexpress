# cargo run -- -c examples/faker.yaml
#
# curl -v http://localhost:2243/claim_check -d '{"name": "Bill Smith"}'
name: claim_check
nodes:
  - id: start
    action: HTTPIn
    config:
      method: POST
      routes:
        - /claim_check

  - id: b2j
    action: BufferToJSON

  - id: claim_check
    action: ClaimCheck

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: claim_check }
