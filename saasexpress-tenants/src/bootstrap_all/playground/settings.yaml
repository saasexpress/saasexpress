name: settings
nodes:
  - id: start
    operator: HTTPIn
    config:
      method: ^(GET)$
      routes:
        - /settings

  - id: translate
    operator: MessageTranslator
    config:
      mode: json
      template: |
        {
          "settings": {
            "stub": {
              "name": "Bar"
            }
          }
        }

  - id: settings
    operator: Settings

  - id: stub
    operator: Stub
    config:
      name: Foo

edges:
  - { from: start, to: translate }
  - { from: translate, to: settings }
  - { from: settings, to: stub }
