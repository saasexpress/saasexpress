name: settings
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(GET)$
      routes:
        - /settings

  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "settings": {
            "stub": {
              "name": "Bar"
            }
          }
        }

  - id: settings
    action: Settings

  - id: stub
    action: Stub
    config:
      name: Foo

edges:
  - { from: start, to: translate }
  - { from: translate, to: settings }
  - { from: settings, to: stub }
