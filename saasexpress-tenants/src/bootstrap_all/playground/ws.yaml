name: ws
nodes:
  - id: start
    operator: HTTPIn
    config:
      ws: true
      method: ^(ANY)$
      routes:
        - /ws

  - id: b2j
    operator: BufferToJSON

  - id: translate
    operator: MessageTranslator
    config:
      mode: json
      template: |
        {
          "temp": temp,
          "resource": input.resource,
          "data": data
        }

  - id: j2b
    operator: JSONToBuffer

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: translate }
  - { from: translate, to: j2b }
