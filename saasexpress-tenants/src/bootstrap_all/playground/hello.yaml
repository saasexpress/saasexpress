name: hello
nodes:
  - id: start
    action: HTTPIn
    config:
      method: GET
      routes:
        - /hello-canodamo

  - id: b2j
    action: BufferToJSON


  - id: translate
    action: MessageTranslator
    config:
      mode: json
      template: |
        {
          "name": has(temp.http_in.query.name) ? temp.http_in.query.name : null,
          "hello": "worldagain",
          "settings": settings,
          "temp": temp,
          "health": data
        }

  - id: canodamo
    action: CanoName

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: translate }
  - { from: translate, to: canodamo }
