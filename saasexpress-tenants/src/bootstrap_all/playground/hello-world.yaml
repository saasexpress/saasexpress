name: hello-world
nodes:
  - id: start
    operator: HTTPIn
    config:
      method: ^(GET)$
      routes:
        - /hello

  - id: translate
    operator: MessageTranslator
    config:
      mode: json
      template: |
        {
          "message": "Hello World!"
        }

edges:
  - { from: start, to: translate }
