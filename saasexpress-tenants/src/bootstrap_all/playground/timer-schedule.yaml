name: timer-schedule
nodes:
  - id: start
    operator: Timer
    config:
      on_start: false

  - id: translate
    operator: MessageTranslator
    config:
      mode: json
      template: |
        {
          "status": "Hardcoded UP!!"
        }

  - id: j2b
    operator: JSONToBuffer

  - id: apicall
    operator: APICall
    config:
      method: GET
      path: ""
      url: http://localhost:2243/health

edges:
  - { from: start, to: translate }
  - { from: translate, to: j2b }
  - { from: j2b, to: apicall }
