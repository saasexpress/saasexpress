# cargo run -- -c examples/faker.yaml
#
# curl -v http://localhost:2243/faker-intemp -d '{"name":"joe"}'
name: faker-intemp
nodes:
  - id: start
    operator: HTTPIn
    method: POST
    routes:
      - /faker-intemp

  - id: b2j
    operator: BufferToJSON

  - id: faker
    operator: Faker

  - id: translate
    operator: MessageTranslator
    mode: json
    in_temp: true
    template: |
      {
        "first_name": temp.faker.name
      }

  - id: translate2
    operator: MessageTranslator
    mode: json
    template: |
      {
        "data": data,
        "temp": temp
      }

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: faker }
  - { from: faker, to: translate }
  - { from: translate, to: translate2 }
