name: ws-3
nodes:
  - id: start
    operator: HTTPIn
    ws: true
    method: ^(ANY)$
    routes:
      - /ws-tweak

  - id: b2j
    operator: BufferToJSON

  - id: translate
    operator: MessageTranslator
    mode: json
    template: |
      {
        "temp": temp,
        "resource": input.resource,
        "data": data
      }

  - id: j2b
    operator: JSONToBuffer

edges:
  - { from: start, to: b2j }
  - { from: b2j, to: translate }
  - { from: translate, to: j2b }
