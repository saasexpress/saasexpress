#
# - implement HTTPIn to match the route
# - make the input and output available in content enricher
# -
#
#
name: tenant-api-get
nodes:
  - id: start
    operator: HTTPIn
    method: ^(GET)$
    routes:
      - /api/tenants
      - /api/tenants/{id}

  - id: rp
    operator: APICall
    url: http://localhost:8081

edges:
  - { from: start, to: rp }
