#
# - implement HTTPIn to match the route
#
name: tenant-ui
nodes:
  - id: start
    operator: HTTPIn
    config:
      method: GET
      routes:
        - /ui
        - /ui/
        - /ui/{*rest}

  - id: rp
    operator: APICall
    config:
      url: http://localhost:8081
      # Running locally use:
      #url: http://localhost:5173

edges:
  - { from: start, to: rp }
