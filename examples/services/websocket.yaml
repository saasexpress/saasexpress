id: websocket-sim
displayName: websocket simulation
serviceUrl: http://localhost:8081
variants:
  V1:
    dag:
      name: V1
      nodes:
        - id: start
          action: HTTPIn
          config:
            method: ^(GET)$
            routes:
              - /api/websocket/:wid
        - id: ws
          action: Websocket
        - id: pub
          action: Publish
        - id: sub
          action: Subscribe
        - id: poller
          action: Poller
          config:
            method: GET
            url: http://localhost:8081/api/services
            contentType: application/json

      edges:
        - from: start
          to: ws
        - from: ws
          to: pub
        - from: ws
          to: sub
        - from: sub
          to: poller
