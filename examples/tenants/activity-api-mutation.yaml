#
# - make the input and output available in content enricher
# - have "variables" in the content-enricher
#
#
name: activity-api-mutation
nodes:
  - id: start
    action: HTTPIn
    config:
      method: ^(DELETE|POST)$
      routes:
        - /api/activity
        - /api/activity/{id}

  - id: rp
    action: APICall
    config:
      url: http://localhost:8081

  - id: bufin
    action: BufferToJSON

  - id: in
    action: MessageTranslator
    config:
      template: |
        {
          "message": "{action} {resource} ({id})",
          "result":  "success",
          "params": {
            "action":   "{{ .http_method }}",
            "resource": "Activity",
            "id": "{{ .in.id }}{{ .params.id }}"
          }
        }

  - id: done
    action: Passthrough

  - id: terminate
    action: Terminate

  # - { id: bufout, action: JSONToBuffer }

edges:
  - { from: start, to: rp }
  - { from: rp, to: bufin }
  - { from: rp, to: done }
  # - { from: start, to: bufin }
  - { from: bufin, to: in }
  - { from: in, to: terminate }

  # - { from: bufin, to: bufout }
