#
# curl -v http://localhost:2500/v1/b8840c-nonprod/data/dev/tfvars
#
# API_CALL_REQWEST_X_VAULT_TOKEN=
# API_CALL_REQWEST_X_VAULT_NAMESPACE=
#

name: shell
nodes:
  - id: start
    action: HTTPIn
    config:
      method: GET
      routes:
        - /v1/{*rest}

  - id: rp
    action: APICall
    config:
      url: https://vault.developer.gov.bc.ca
      method: GET

edges:
  - { from: start, to: rp }
