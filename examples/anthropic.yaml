name: shell
nodes:
  - id: start
    action: HTTPIn
    config:
      method: POST
      routes:
        - /prompt

  - id: anthropic
    action: MessageTranslator
    config:
      template: |
        { 
          "headers": {
            "x-api-key": settings.X_API_KEY,
            "anthropic-version": settings.ANTHROPIC_VERSION,
            "content-type": "application/json"
          },
          "body": {
            "model": "claude-3-7-sonnet-20250219",
            "max_tokens": 1024,
            "messages": [
                {"role": "user", "content": input.query.prompt}
            ]
          },
          "data": data
        }

  - id: rp
    action: APICall
    config:
      url: https://api.anthropic.com/v1/messages
      method: POST

edges:
  - { from: start, to: anthropic }
  - { from: anthropic, to: rp }
